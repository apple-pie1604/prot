name: Build Signed APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Кэширование зависимостей
      - name: Cache Build Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            .venv
          key: ${{ runner.os }}-kivy-release-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-kivy-release-

      # Системные пакеты для сборки Android и подписи (openjdk содержит jarsigner)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake zip unzip openjdk-17-jdk

      # Создание виртуального окружения
      - name: Setup Virtual Environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install buildozer cython setuptools

      # Шаг 1: Декодирование Keystore с использованием безопасной переменной окружения
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android.jks

      # Шаг 2: Сборка Release APK в виртуальном окружении
      - name: Build Release APK
        run: |
          source .venv/bin/activate
          buildozer -v android release

      # Шаг 3: Подпись APK с передачей паролей через переменные окружения env
      - name: Sign the APK manually
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          APK_PATH=$(find ./bin -name "*-release-unsigned.apk" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android.jks \
            -storepass "$KEYSTORE_PASS" \
            -keypass "$KEY_PASS" \
            "$APK_PATH" "$KEY_ALIAS"

      # Шаг 4: Переименование подписанного APK
      - name: Rename the signed APK
        run: |
          APK_PATH=$(find ./bin -name "*-release-unsigned.apk" | head -n 1)
          NEW_APK_PATH="${APK_PATH/-unsigned/-signed}"
          mv "$APK_PATH" "$NEW_APK_PATH"

      # Шаг 5: Загрузка артефакта
      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: ./bin/*-release-signed.apk

